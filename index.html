<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube 字幕阅读器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #faf8f5 0%, #f0ede8 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            color: #1a1a2e;
        }
        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(255,255,255,.85);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,.08);
            border: 1px solid rgba(255,255,255,.5);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo svg { color: #c0392b; }
        .logo h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -.02em;
        }
        .subtitle {
            font-size: 14px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        .input-group input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid #e0dcd5;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            background: #fff;
            outline: none;
            transition: border-color .2s;
        }
        .input-group input:focus { border-color: #c0392b; }
        .input-group button {
            padding: 12px 24px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }
        .input-group button:hover { background: #a33226; }
        .input-group button:active { transform: scale(.97); }
        .hint {
            margin-top: 12px;
            font-size: 12px;
            color: #aaa;
        }
        .features {
            margin-top: 32px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .feature {
            padding: 16px;
            background: rgba(255,255,255,.6);
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,.04);
        }
        .feature .icon { font-size: 20px; margin-bottom: 6px; }
        .feature h3 { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .feature p { font-size: 12px; color: #888; line-height: 1.4; }
        @media (max-width: 500px) {
            .card { padding: 32px 24px; }
            .input-group { flex-direction: column; }
            .features { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
            <h1>字幕阅读器</h1>
        </div>
        <p class="subtitle">粘贴 YouTube 视频链接，生成排版优美的字幕阅读页，可分享给任何人。</p>

        <div class="input-group">
            <input type="text" id="url-input" placeholder="https://www.youtube.com/watch?v=..." />
            <button onclick="go()">生成阅读页</button>
        </div>
        <p class="hint">支持 youtube.com 和 youtu.be 链接</p>

        <div class="features">
            <div class="feature">
                <div class="icon">📖</div>
                <h3>舒适阅读</h3>
                <p>大字号、宽行距，专注内容</p>
            </div>
            <div class="feature">
                <div class="icon">🔗</div>
                <h3>可分享链接</h3>
                <p>生成后可分享到飞书、微信</p>
            </div>
            <div class="feature">
                <div class="icon">🎨</div>
                <h3>精美排版</h3>
                <p>每页随机渐变色背景</p>
            </div>
            <div class="feature">
                <div class="icon">⏱️</div>
                <h3>时间戳</h3>
                <p>点击跳转到视频对应位置</p>
            </div>
        </div>
    </div>

    <script>
        function extractVideoId(url) {
            const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
            return m ? m[1] : null;
        }

        function go() {
            const url = document.getElementById('url-input').value.trim();
            const id = extractVideoId(url);
            if (id) {
                window.location.href = '/v/' + id;
            } else {
                alert('请输入有效的 YouTube 视频链接');
            }
        }

        document.getElementById('url-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') go();
        });
    </script>
</body>
</html>
